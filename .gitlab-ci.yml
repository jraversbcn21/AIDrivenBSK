stages: [verify, test, explore]

default:
  image: mcr.microsoft.com/playwright:v1.61.0-jammy
  cache:
    key:
      files: [pnpm-lock.yaml]
    paths: [.pnpm-store]
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

verify:
  stage: verify
  script:
    - pnpm typecheck
    - pnpm lint
    - pnpm test:unit

# Masked/Protected CI Variables
# BASE_URL, BERSHKA_USER, and BERSHKA_PASS are configured as masked/protected
# GitLab CI/CD variables (Settings → CI/CD → Variables) and are intentionally
# NOT committed to this file for security.
# Note: GitLab runners must be able to reach the DES host (*.inditex.grp).
# If shared runners cannot, attach a self-hosted runner on the corp network
# by adding a 'tags:' entry to the job.

e2e:
  stage: test
  variables:
    ENVIRONMENT: des
  script:
    - pnpm exec playwright test
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - reports/
      - test-results/

# Explorer diff gate: detects new/changed/removed pages, elements, forms, and flows against the
# committed coverage/functional-map.json. Scheduled-only (needs a GitLab CI/CD Schedule created
# under Settings -> CI/CD -> Schedules; `rules` below means it never runs on an ordinary push/MR
# pipeline) and non-blocking (allow_failure: true) on purpose: the committed map is a bounded
# crawl (EXPLORER_MAX_PAGES=80, matched here so diffs compare like-for-like); --fail-on-new is
# expected to surface real drift for review, not to gate every merge on a map that is itself
# still maturing. Promote to blocking once the map's coverage is trustworthy.
# EXPLORER_TIME_BUDGET_MS raised from the 600_000ms default (2026-07-03): the PLP-grid
# extraction fix (findings doc §10) adds a real, measured ~3.5-5s/page settle wait, so an
# 80-page/session crawl now measures ~8.3s/page average (~11 min bare minimum) and no longer
# fits the old 10-minute default with any margin.
explore:
  stage: explore
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true
  variables:
    ENVIRONMENT: des
    EXPLORER_MAX_PAGES: "80"
    EXPLORER_TIME_BUDGET_MS: "1200000"
  script:
    # The auth-session crawl reads .auth/state.json directly (explorer/cli.ts), which pnpm
    # explore does not generate itself - a fresh job checkout needs the Playwright setup
    # project run first, the same way the e2e job's chromium project depends on it.
    - pnpm exec playwright test --project=setup
    - pnpm explore --diff --fail-on-new
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - reports/explorer/
